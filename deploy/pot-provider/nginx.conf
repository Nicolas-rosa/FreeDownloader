events {
    worker_connections 1024;
}

http {
    # Logs
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # Redirecionar HTTP → HTTPS
    server {
        listen 80;
        server_name pot.example.com;
        
        location /.well-known/acme-challenge {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS com TLS
    server {
        listen 443 ssl http2;
        server_name pot.example.com;
        
        # Certificados (gerar com: certbot certonly --standalone -d pot.example.com)
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        
        # Configurações de segurança SSL/TLS
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Rate limiting (opcional)
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        limit_req zone=api burst=20 nodelay;
        
        # Health check endpoint (sem autenticação)
        location /health {
            access_log off;
            proxy_pass http://pot-provider:8888;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # API endpoint (com autenticação)
        location / {
            # Validar header de autenticação
            # Substitua 'seu-secret-token-aqui' por: openssl rand -hex 32
            if ($http_x_po_token_auth != "seu-secret-token-aqui") {
                return 401 "Unauthorized: Invalid or missing X-PO-Token-Auth header";
            }
            
            # Proxy para pot-provider interno
            proxy_pass http://pot-provider:8888;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts (ajustar conforme necessário)
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffer
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
        
        # Negar acesso a arquivos sensíveis
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
